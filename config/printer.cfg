dir_pin: !PA6
enable_pin: !PB5
microsteps: 16 
rotation_distance : 8


#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: PD1
dir_pin: !PD0
enable_pin: !PD4
microsteps: 16
rotation_distance: 7.680
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA4
control: pid
pid_Kp:25.937
pid_Ki:1.465
pid_Kd:114.773
min_temp: 0
max_temp: 300
min_extrude_temp: 1
max_extrude_only_distance: 100
max_extrude_only_velocity: 100
smooth_time: 0.2
full_steps_per_rotation: 200
pressure_advance: 0.05
#pressure_advance_smooth_time: 0.020
#max_extrude_cross_section: 50


##########################################################
# Definition for the secondary carriage X2 and extruder 1
##########################################################

[dual_carriage]
axis: x
step_pin: PE9
dir_pin: !PE8
enable_pin: !PE11
microsteps: 16
rotation_distance: 50
endstop_pin: !PE15
position_endstop: 360
position_max: 360
homing_speed: 50


[extruder1]
step_pin: PB1
dir_pin: !PB0
enable_pin: !PE7
microsteps: 16
rotation_distance: 7.680
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA5
control: pid
pid_Kp:24.747
pid_Ki:1.363 
pid_Kd:112.287
min_temp: 0
max_temp: 300
min_extrude_temp: 1
max_extrude_only_distance: 100
max_extrude_only_velocity: 100
smooth_time: 0.2
full_steps_per_rotation: 200
#pressure_advance: 0.0
#pressure_advance_smooth_time: 0.020
#max_extrude_cross_section: 4


#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA3
min_temp: 0
max_temp: 113
control: pid
pid_Kp: 312.84
pid_Ki: 52.04
pid_Kd: 1253.64


#####################################################################
#   Probe
#####################################################################

[bltouch]
# 0 = no high-speed
# 1 = simultaneous stow and toolhead raise
# 2 = no intermediate deploy and stow + (1)
#high_speed_mode: 2
# you can specify an absolute minimum cmd time
#min_cmd_time: 0.150
# set this to false if probe does not support it
#test_sensor_before_use: True
# choose to use SW mode
#use_sw_mode: True
#
sensor_pin: ^PD12
control_pin: PD13
x_offset: 0
y_offset: 25
#z_offset: 6.0
speed: 3.0
stow_on_each_sample: False
samples: 1
pin_up_touch_mode_reports_triggered: False
probe_with_touch_mode: True


[z_tilt]
z_positions: 10,150
            290,150
points: 50,150.5
        280,150.5
retries: 10
horizontal_move_z: 5
retry_tolerance: 0.02
speed:100

[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 10,45
mesh_max: 290, 270
probe_count: 6,6

[bed_screws] # BED_SCREWS_ADJUST
screw1: 25,35
screw1_name: front left screw
screw4:	295,35
screw2_name: front right screw
screw3: 295,295
screw3_name: back right screw
screw2: 25,295
screw4_name: back left screw
speed: 150

[screws_tilt_adjust]
screw1: 31,0
screw1_name: Front Left
screw2: 270,0
screw2_name: Front Right
screw3: 270,240
screw3_name: Rear Right
screw4: 31,240
screw4_name: Rear Left
horizontal_move_z: 10.
speed: 100
screw_thread: CW-M4

#[safe_z_home]
#home_xy_position:150.5,150.5
#speed:150
#z_hop:10
#z_hop_speed:5

####################################
# Homing override for Z axis
# When homing command includes Home Z, it is critical to ensure correct
# extruder is selected to be centered on the bed before probing to
# prevent bed damage. Homing process is overridden to include T0 macro
# prior to homing process.  - Kevin Palmer
####################################

#################### Thanks to Kevin Palmer  #####################################

[homing_override]
axes: z
gcode:
 T0
 G90 ;absolute positioning
 G1 Z10 F600
 G28 X0
 G28 Y0

 G1 X150.5 Y150.5 F9000
 SAFE_HOME_Z
 G1 Z10
set_position_z:0


#####################################################################
#   Runoutsensor
#####################################################################

[filament_switch_sensor Left]
pause_on_runout: False
runout_gcode: M600
switch_pin: PE5

[filament_switch_sensor Right]
pause_on_runout: False
runout_gcode: M600
switch_pin: PE6


[idle_timeout]
gcode:
 {% if printer.pause_resume.is_paused %}
   # M104 S0
 {% else %}
   TURN_OFF_HEATERS
   M84
 {% endif %}


