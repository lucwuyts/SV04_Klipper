########################################
# START-PRINT
########################################

[gcode_macro START_PRINT]
description: Stable START_PRINT with Orca + adaptive mesh + IDEX modes
gcode:

    ##### PARAMETERS #####
    {% set mode = params.MODE|default("SINGLE")|upper %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set extruders = params.EXTRUDERS|default(1)|int %}
    {% set T0 = params.EXTRUDER_TEMP|default(0)|float %}
    {% set T1 = params.EXTRUDER1_TEMP|default(0)|float %}
    {% set BED = params.BED_TEMP|default(0)|float %}

    ##### AREA (Orca vector support) #####
    {% if params.AREA_START is defined and params.AREA_END is defined %}
        {% set area_start_x = params.AREA_START.split(",")[0]|float %}
        {% set area_start_y = params.AREA_START.split(",")[1]|float %}
        {% set area_end_x = params.AREA_END.split(",")[0]|float %}
        {% set area_end_y = params.AREA_END.split(",")[1]|float %}
    {% else %}
        {% set area_start_x = 0 %}
        {% set area_start_y = 0 %}
        {% set area_end_x = 0 %}
        {% set area_end_y = 0 %}
    {% endif %}

    ##### RESET #####
    CLEAR_PAUSE
    M220 S100
    M221 S100
    G90

    ##### HEATING #####
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED}

    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={T0}
    SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={T1}

    ##### HOMING #####
    SAFE_HOME
    SAFE_Z_TILT

    ##### ADAPTIVE BED MESH #####
    BED_MESH_CALIBRATE \
        AREA_START_X={area_start_x} \
        AREA_START_Y={area_start_y} \
        AREA_END_X={area_end_x} \
        AREA_END_Y={area_end_y}

    G28 X
    G0 Z2 F600

    ##### WAIT HOTENDS #####
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={T0}
    {% if extruders == 2 %}
        TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={T1}
    {% endif %}

    ##### MODE SELECT #####
    {% if mode == "COPY" and extruders == 2 %}

        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
        M117 Copy Mode

    {% elif mode == "MIRROR" and extruders == 2 %}

        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
        M117 Mirror Mode

    {% else %}

        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY

        {% if extruder == 1 %}
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
        {% else %}
            ACTIVATE_EXTRUDER EXTRUDER=extruder
        {% endif %}

        M117 Single Mode

    {% endif %}

    ##### PRIME #####
    PRIME_LINE

    M117 Printing


[gcode_macro START_PRINT_ORG]
description: Start routine for the print
variable_retract: 1
; gcode parameters for area bed mesh
variable_parameter_AREA_START : 0,0
variable_parameter_AREA_END : 0,0
gcode:

    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set extruders = params.EXTRUDERS|default(1)|int %}

    # chatgpt -> aanpassing voor orca
    {% set area_start_x = params.AREA_START_X|default(0)|float %}
    {% set area_start_y = params.AREA_START_Y|default(0)|float %}
    {% set area_end_x = params.AREA_END_X|default(0)|float %}
    {% set area_end_y = params.AREA_END_Y|default(0)|float %}


# --- FIX: herstel juiste dual carriage mode ---
    {% if printer.dual_carriage is defined %}

      {% if extruders == 2 and extruder == -1 %}
          # COPY mode (Cura)
          SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
  
      {% elif extruders == 2 %}
          # normale dual mode
          SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
          SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
  
      {% else %}
          # single
          SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
          SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
  
      {% endif %}

    {% endif %}
    
    {% set extruder_temp = params.EXTRUDER_TEMP|default(0)|float %}
    {% set extruder1_temp = params.EXTRUDER1_TEMP|default(0)|float %}
    {% set bed_temp = params.BED_TEMP|default(0)|float %}    
################   Global Settings   ##########################################      
    CLEAR_PAUSE
    SET_DUAL_CARRIAGE CARRIAGE=0                                                    # luc -> 0 hier stond {carriage} maar geeft (denk ik) een error voordat hij start (staat dan op -1)
                                                                                                 
    M220 S100                                                                                   # reset feedrate
    M221 S100                                                                                   # reset flowrate
	G90                                                                                         # absolute positioning
    #M83 
    # Heating
    #UPDATE_DELAYED_GCODE ID=DELAY_HEATERS DURATION=0
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp} 
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp}                                       # wait for bed temp

     
################   DUAL MODUS   ##########################################                                  

    {% if extruders == 2 %}
        {% if printer.dual_carriage.carriage_1 == "INACTIVE" %}
            # Heating
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}                       # set extruder temp
            SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={extruder1_temp}                     # set extruder1 temp
            SET_GCODE_OFFSET Z=0.0  
            # Homing
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SAFE_HOME
            SAFE_Z_TILT
            ######### load BED MESH Here #####
            # BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}
            BED_MESH_PROFILE LOAD=default
            # G28 X   
            G0 Z2 F600                                                                          # raise Z
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}    
            TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={extruder1_temp}
            {% if extruder == 1 %}
            SET_DUAL_CARRIAGE CARRIAGE=1
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            {% endif %}
            PRIME_LINE 

        {% elif printer.dual_carriage.carriage_0 == "INACTIVE" %}
            # Heating
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}                       # set extruder temp
            SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={extruder1_temp}                     # set extruder1 temp
            SET_GCODE_OFFSET Z=0.0  
            # Homing
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SAFE_HOME
            SAFE_Z_TILT         
            ######### load BED MESH Here #####
            # BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}
            BED_MESH_PROFILE LOAD=default
            # G28 X   
            G0 Z2 F600                                                                          # raise Z
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}    
            TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={extruder1_temp}
            {% if extruder == 1 %}
            SET_DUAL_CARRIAGE CARRIAGE=1
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            {% endif %}
            PRIME_LINE 
        
################   MIRROR MODUS   ##########################################                        
        {% elif printer.dual_carriage.carriage_1 == "MIRROR" %}
            # Heating
            #SET_DUAL_CARRIAGE CARRIAGE=0
            #ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}                       # set extruder temp
            SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={extruder1_temp}                     # set extruder1 temp
            SET_GCODE_OFFSET Z=0.0
            # Homing
            #SET_DUAL_CARRIAGE_MODE MODE=FULL_CONTROL
            #SET_DUAL_CARRIAGE CARRIAGE=0
            SAFE_HOME
            SAFE_Z_TILT
            ######### load BED MESH Here #####
            # BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}
            BED_MESH_PROFILE LOAD=default
            # G28 X
         #   SET_DUAL_CARRIAGE_MODE MODE=MIRRORED
            G0 Z2 F600                                                                          # raise Z
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}    
            TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={extruder1_temp}
        #    SET_DUAL_CARRIAGE CARRIAGE=0
         #   ACTIVATE_EXTRUDER EXTRUDER=extruder
            M605 S3
            PRIME_LINE
################   COPY MODUS   ##########################################      
    #{% elif extruders == 4 %}
        {% elif printer.dual_carriage.carriage_1 == "COPY" %}
            # Heating
            #SET_DUAL_CARRIAGE CARRIAGE=0
            #ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}                       # set extruder temp
            SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={extruder1_temp}                     # set extruder1 temp
            SET_GCODE_OFFSET Z=0.0
            # Homing
         #   SET_DUAL_CARRIAGE_MODE MODE=FULL_CONTROL
         #   SET_DUAL_CARRIAGE CARRIAGE=0
            SAFE_HOME
            SAFE_Z_TILT
            ######### load BED MESH Here #####   
            # BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}         
            BED_MESH_PROFILE LOAD=default
            # G28 X
         #   SET_DUAL_CARRIAGE_MODE MODE=DUPLICATION
            G0 Z2 F600                                                                          # raise Z
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}    
            TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={extruder1_temp}
       #     SET_DUAL_CARRIAGE CARRIAGE=0
        #    ACTIVATE_EXTRUDER EXTRUDER=extruder
            M605 S2 
            PRIME_LINE
        {% endif %}
################   SINGLE MODUS   ##########################################        
    {% else %}
        {% if extruder == 0 %}
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
                SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}                  # set extruder temp
                SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
            SAFE_HOME
            SAFE_Z_TILT
            ######### load BED MESH Here ##### 
            BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}          
        {% else %}
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            # Homing
            SAFE_HOME
            SAFE_Z_TILT
            ######### load BED MESH Here #####  
            BED_MESH_CALIBRATE AREA_START={params.AREA_START|default("0,0")} AREA_END={params.AREA_END|default("0,0")}       
            # G28 X
            SET_DUAL_CARRIAGE CARRIAGE=1
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            # Heating
            SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET={extruder_temp}                    # set extruder1 temp
            SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
        {% endif %}
        SET_GCODE_OFFSET Z=0.0
        G0 Z2 F600
        {% if extruder == 0 %}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}                         # wait for extruder temp
        {% else %}
            TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={extruder_temp}                        # wait for extruder temp
        {% endif %}    
        PRIME_LINE    
    {% endif %}
    M117 Printing
    ;DGUS_PRINT_START

########################################
# END-PRINT
########################################    

[gcode_macro END_PRINT]
gcode:
        #Get Printer built volume dimensions
        {% set X_MAX = printer.toolhead.axis_maximum.x|default(100)|float %}
        {% set Y_MAX = printer.toolhead.axis_maximum.y|default(100)|float %}

        #Fix-up extruder
        G91                                            
        G1 E-2 F2700                                    
        G1 E-1.5 Z0.2 F2400                        
        G1 X5 Y5 F6000                               
        G1 Z10                                     
        G90                                        

        #Present print
        G1 Z{printer.toolhead.position.z + 10} F600
        G1 X{X_MAX / 2} Y{Y_MAX-20} F6000
        M106 S0                                      
        TURN_OFF_HEATERS                                 

        # Tools naar zijkant
        _PARK_TOOL

        #Disable Steppers
        M84 X Y E                  
        M117 Print ready                ; Send finish to display
        #M605 S1
        SET_DUAL_CARRIAGE CARRIAGE=0
        T0
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
        SAVE_AT_END
        ;DGUS_PRINT_END
