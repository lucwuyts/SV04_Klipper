######################################################################
# Filament Change
######################################################################

# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.

[pause_resume]


[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state

########################################
# MESH BED Only Printed/ PRINT-AREA
########################################  

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE

# compatibiliteit met oude slicers
variable_parameter_AREA_START : 0,0
variable_parameter_AREA_END : 0,0

gcode:
    {% set bedMeshConfig = printer["configfile"].config["bed_mesh"] %}
    {% set safe_min_x = bedMeshConfig.mesh_min.split(",")[0]|float %}
    {% set safe_min_y = bedMeshConfig.mesh_min.split(",")[1]|float %}
    {% set safe_max_x = bedMeshConfig.mesh_max.split(",")[0]|float %}
    {% set safe_max_y = bedMeshConfig.mesh_max.split(",")[1]|float %}

    # -----------------------------
    # 1. AREA bepalen
    # -----------------------------
    
    {% set has_area = False %}

    {% if params.AREA_START_X is defined and params.AREA_END_X is defined %}
        # ✅ Orca (aanrader)
        {% set area_min_x = params.AREA_START_X|float %}
        {% set area_min_y = params.AREA_START_Y|float %}
        {% set area_max_x = params.AREA_END_X|float %}
        {% set area_max_y = params.AREA_END_Y|float %}
        {% set has_area = True %}

    {% elif params.AREA_START is defined and params.AREA_END is defined %}
        # 🔁 Cura / oude methode
        {% set area_min_x = params.AREA_START.split(",")[0]|float %}
        {% set area_min_y = params.AREA_START.split(",")[1]|float %}
        {% set area_max_x = params.AREA_END.split(",")[0]|float %}
        {% set area_max_y = params.AREA_END.split(",")[1]|float %}
        {% set has_area = True %}
    {% endif %}

    # -----------------------------
    # 2. Geen area → full mesh
    # -----------------------------

    {% if not has_area %}
        {action_respond_info("BED_MESH: Full bed (no area)")}
        BED_MESH_CALIBRATE_BASE

    {% else %}

        # -----------------------------
        # 3. Clamp binnen bed
        # -----------------------------
        
        {% set area_min_x = [area_min_x, safe_min_x]|max %}
        {% set area_min_y = [area_min_y, safe_min_y]|max %}
        {% set area_max_x = [area_max_x, safe_max_x]|min %}
        {% set area_max_y = [area_max_y, safe_max_y]|min %}

        # -----------------------------
        # 4. Margin toevoegen
        # -----------------------------
        
        {% set margin = 5.0 %}
        {% set area_min_x = [area_min_x - margin, safe_min_x]|max %}
        {% set area_min_y = [area_min_y - margin, safe_min_y]|max %}
        {% set area_max_x = [area_max_x + margin, safe_max_x]|min %}
        {% set area_max_y = [area_max_y + margin, safe_max_y]|min %}

        # -----------------------------
        # 5. Grootte bepalen
        # -----------------------------
        
        {% set size_x = area_max_x - area_min_x %}
        {% set size_y = area_max_y - area_min_y %}

        # -----------------------------
        # 6. Kleine prints → skip mesh
        # -----------------------------
        
        {% if size_x < 20 and size_y < 20 %}
            {action_respond_info("BED_MESH: Skipped (small print)" )}

        {% else %}

            # -----------------------------
            # 7. Adaptive probe grid
            # -----------------------------
            
            {% set base_points = 6 %}
            {% set probe_x = (base_points * size_x / (safe_max_x - safe_min_x))|round(0)|int %}
            {% set probe_y = (base_points * size_y / (safe_max_y - safe_min_y))|round(0)|int %}

            {% set probe_x = [probe_x, 3]|max %}
            {% set probe_y = [probe_y, 3]|max %}

            # -----------------------------
            # 8. Debug info
            # -----------------------------
            
            {action_respond_info("BED_MESH: Adaptive")}
            {action_respond_info("Min: %.1f,%.1f" % (area_min_x, area_min_y))}
            {action_respond_info("Max: %.1f,%.1f" % (area_max_x, area_max_y))}
            {action_respond_info("Grid: %dx%d" % (probe_x, probe_y))}

            # -----------------------------
            # 9. Mesh uitvoeren
            # -----------------------------
            
            BED_MESH_CALIBRATE_BASE \
                mesh_min={area_min_x},{area_min_y} \
                mesh_max={area_max_x},{area_max_y} \
                probe_count={probe_x},{probe_y}

        {% endif %}

    {% endif %}

